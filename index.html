<!DOCTYPE html>
<html>

<head>

<title>Spark Inc Marketplace</title>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:#eee;
}

header{
text-align:center;
padding:20px;
border-bottom:2px solid gold;
}

.logo{
width:600px;
max-width:90%;
}

.container{
width:1100px;
max-width:95%;
margin:auto;
padding:30px;
}

h2{
color:gold;
border-bottom:1px solid #222;
padding-bottom:10px;
margin-top:40px;
}

h3{
color:gold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:#111;
padding:20px;
border-radius:6px;
text-align:center;
border:1px solid #222;
transition:0.2s;
}

.card:hover{
border:1px solid gold;
transform:scale(1.03);
}

.price{
color:gold;
font-weight:bold;
font-size:18px;
}

button{
background:gold;
border:none;
padding:8px 14px;
border-radius:4px;
cursor:pointer;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
background:#111;
margin-top:20px;
}

th,td{
padding:12px;
border-bottom:1px solid #222;
}

.buy{color:#00ff9c;font-weight:bold;}
.low{color:#ffd000;font-weight:bold;}
.no{color:#ff4d4d;font-weight:bold;}

.totalBox{
position:fixed;
bottom:20px;
right:20px;
background:#111;
border:1px solid gold;
padding:15px;
border-radius:6px;
}

</style>

</head>

<body>

<header>

<img src="images/spark-logo.png" class="logo" alt="Spark Inc logo">

</header>

<div class="container">

<h2>Material Buying Board</h2>

<table id="materialsTable">
<tr>
<th>Material</th>
<th>Status</th>
<th>Price</th>
</tr>
</table>

<h2>Weapons</h2>
<div id="weaponGrid"></div>

<h2>Ammunition</h2>
<div id="ammoGrid" class="grid"></div>

<h2>Custom Packages</h2>
<div id="packageGrid" class="grid"></div>

</div>

<div class="totalBox">
Total: $<span id="total">0</span>
</div>

<script>

let total=0

function addPrice(price){

price = price.replace(/,/g,"")

total += Number(price)

document.getElementById("total").innerText = total.toLocaleString()

}

fetch("prices.json")

.then(response=>response.json())

.then(data=>{

/* MATERIALS */

let materialsTable=document.getElementById("materialsTable")

data.materials.forEach(item=>{

let row=document.createElement("tr")

let statusClass="no"

if(item.status==="BUYING") statusClass="buy"
if(item.status==="LOW DEMAND") statusClass="low"

row.innerHTML=`

<td>${item.name}</td>
<td class="${statusClass}">${item.status}</td>
<td>$${item.price}</td>

`

materialsTable.appendChild(row)

})

/* WEAPONS */

let weaponGrid=document.getElementById("weaponGrid")

for (let category in data.weapons){

let section=document.createElement("div")

let heading=document.createElement("h3")

heading.innerText=category

section.appendChild(heading)

let grid=document.createElement("div")
grid.className="grid"

data.weapons[category].forEach(item=>{

let card=document.createElement("div")
card.className="card"

card.innerHTML=`

<h4>${item.name}</h4>
<p class="price">$${item.price}</p>
<button onclick="addPrice('${item.price}')">Add</button>

`

grid.appendChild(card)

})

section.appendChild(grid)

weaponGrid.appendChild(section)

}

/* AMMO */

let ammoGrid=document.getElementById("ammoGrid")

data.ammo.forEach(item=>{

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<h3>${item.name}</h3>
<p class="price">$${item.price}</p>
<button onclick="addPrice('${item.price}')">Add</button>

`

ammoGrid.appendChild(card)

})

/* PACKAGES */

let packageGrid=document.getElementById("packageGrid")

data.packages.forEach(item=>{

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<h3>${item.name}</h3>
<p>${item.contents}</p>
<p class="price">$${item.price}</p>
<button onclick="addPrice('${item.price}')">Add</button>

`

packageGrid.appendChild(card)

})

})


</script>

</body>
</html>
